<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Printer body -->
  <rect x="16" y="40" width="96" height="52" rx="6" fill="#2c3e50"/>
  <rect x="20" y="44" width="88" height="44" rx="4" fill="#34495e"/>
  <!-- Paper slot top -->
  <rect x="28" y="36" width="72" height="12" rx="2" fill="#ecf0f1"/>
  <!-- Paper coming out (label) -->
  <rect x="30" y="14" width="68" height="28" rx="2" fill="#ffffff" stroke="#bdc3c7" stroke-width="1.5"/>
  <!-- Barcode on label -->
  <rect x="38" y="18" width="2" height="12" fill="#2c3e50"/>
  <rect x="42" y="18" width="3" height="12" fill="#2c3e50"/>
  <rect x="47" y="18" width="1" height="12" fill="#2c3e50"/>
  <rect x="50" y="18" width="2" height="12" fill="#2c3e50"/>
  <rect x="54" y="18" width="3" height="12" fill="#2c3e50"/>
  <rect x="59" y="18" width="1" height="12" fill="#2c3e50"/>
  <rect x="62" y="18" width="2" height="12" fill="#2c3e50"/>
  <rect x="66" y="18" width="3" height="12" fill="#2c3e50"/>
  <rect x="71" y="18" width="2" height="12" fill="#2c3e50"/>
  <rect x="75" y="18" width="1" height="12" fill="#2c3e50"/>
  <rect x="78" y="18" width="3" height="12" fill="#2c3e50"/>
  <rect x="83" y="18" width="2" height="12" fill="#2c3e50"/>
  <!-- Text line on label -->
  <rect x="38" y="33" width="52" height="3" rx="1" fill="#7f8c8d"/>
  <!-- LED indicator -->
  <circle cx="92" cy="54" r="4" fill="#f59e0b"/>
  <!-- Paper output slot bottom -->
  <rect x="28" y="84" width="72" height="6" rx="2" fill="#1a252f"/>
  <!-- Output paper/label -->
  <rect x="30" y="88" width="68" height="26" rx="2" fill="#ffffff" stroke="#bdc3c7" stroke-width="1.5"/>
  <!-- QR code on output label -->
  <rect x="72" y="92" width="20" height="20" fill="#ffffff" stroke="#2c3e50" stroke-width="1"/>
  <!-- QR pattern -->
  <rect x="74" y="94" width="5" height="5" fill="#2c3e50"/>
  <rect x="85" y="94" width="5" height="5" fill="#2c3e50"/>
  <rect x="74" y="105" width="5" height="5" fill="#2c3e50"/>
  <rect x="75" y="95" width="3" height="3" fill="#ffffff"/>
  <rect x="86" y="95" width="3" height="3" fill="#ffffff"/>
  <rect x="75" y="106" width="3" height="3" fill="#ffffff"/>
  <rect x="76" y="96" width="1" height="1" fill="#2c3e50"/>
  <rect x="87" y="96" width="1" height="1" fill="#2c3e50"/>
  <rect x="76" y="107" width="1" height="1" fill="#2c3e50"/>
  <rect x="80" y="100" width="2" height="2" fill="#2c3e50"/>
  <rect x="83" y="98" width="1" height="1" fill="#2c3e50"/>
  <rect x="80" y="103" width="1" height="2" fill="#2c3e50"/>
  <!-- Text lines on output label -->
  <rect x="36" y="94" width="30" height="3" rx="1" fill="#2c3e50"/>
  <rect x="36" y="100" width="28" height="2" rx="1" fill="#7f8c8d"/>
  <rect x="36" y="105" width="24" height="2" rx="1" fill="#7f8c8d"/>
  <rect x="36" y="110" width="20" height="2" rx="1" fill="#95a5a6"/>
</svg>
